name: build

on:
  push:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-arm:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Ensure podman is installed
        run: command -v podman || sudo apt-get install -y --no-install-recommends podman

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Persist the toolchain image in GHCR rather than the 7-day Actions cache:
      # building it from scratch takes ~an hour and depends on upstream tarballs
      # that can vanish (kernel.org purged the v4.x kernel this image needs).
      # Tag by Dockerfile hash so an unchanged Dockerfile reuses the published
      # image and only a Dockerfile change triggers a rebuild + republish.
      - name: Pull or build the build image
        env:
          # GHCR repository paths must be lowercase.
          REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/plato-build
        run: |
          image="$(echo "$REGISTRY_IMAGE" | tr '[:upper:]' '[:lower:]')"
          ref="${image}:$(sha256sum Dockerfile | cut -c1-16)"
          if podman pull "$ref"; then
            echo "Reusing published image $ref"
            podman tag "$ref" plato-build
          else
            echo "No published image for this Dockerfile; building $ref"
            # crosstool-ng needs more than 1024 open files
            podman build --ulimit nofile=2048:2048 -t plato-build -t "$ref" .
            podman push "$ref"
          fi

      # Keep the upstream source tarballs across runs, keyed only on the URL
      # list, so an unchanged download.sh never re-hits the (often flaky)
      # mirrors even when the compiled-deps cache below is invalidated.
      - name: Cache thirdparty source tarballs
        uses: actions/cache@v4
        with:
          path: thirdparty/downloads
          key: plato-tarballs-${{ hashFiles('thirdparty/download.sh') }}
          restore-keys: |
            plato-tarballs-

      - name: Cache compiled C dependencies
        uses: actions/cache@v4
        with:
          path: |
            libs
            thirdparty
          key: plato-cdeps-${{ hashFiles('Dockerfile', 'thirdparty/download.sh', 'thirdparty/build.sh', 'thirdparty/*/build-kobo.sh', 'thirdparty/*/kobo.patch') }}
          restore-keys: |
            plato-cdeps-

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/plato-build/cargo-registry
            ~/.cache/plato-build/cargo-git
            target
          key: plato-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            plato-cargo-

      - name: Compute artifact metadata
        id: meta
        run: |
          branch="${GITHUB_REF_NAME//\//-}"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build inside container
        run: |
          mkdir -p ~/.cache/plato-build/cargo-registry ~/.cache/plato-build/cargo-git
          podman run --rm \
            --ulimit nofile=2048:2048 \
            -v "$PWD:/workspace" \
            -v "$HOME/.cache/plato-build/cargo-registry:/usr/local/cargo/registry" \
            -v "$HOME/.cache/plato-build/cargo-git:/usr/local/cargo/git" \
            plato-build \
            sh -c './build.sh slow && ./dist.sh'

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: plato-${{ steps.meta.outputs.branch }}-${{ steps.meta.outputs.sha }}
          path: dist/
          retention-days: 90
          if-no-files-found: error
